    const el = (tag, attrs = {}, html = "") => {
      const node = document.createElement(tag);
      Object.entries(attrs).forEach(([key, value]) => {
        if (key === "class") node.className = value;
        else if (key === "dataset") Object.entries(value).forEach(([k, v]) => node.dataset[k] = v);
        else node.setAttribute(key, value);
      });
      node.innerHTML = html;
      return node;
    };

    const sectionHead = section => `
      <div class="section-head">
        <h2 id="${section.id}-title">${section.title}</h2>
        <span class="en">${section.en}</span>
      </div>`;

    const plainList = items => `<ul class="clean-list">${items.map(item => `<li>${item}</li>`).join("")}</ul>`;
    const timelineList = items => `<ul class="clean-list timeline">${items.map(item => `<li><div class="when">${item.when}</div><div class="what">${item.what}</div></li>`).join("")}</ul>`;

    const publicationYears = publications => [...new Set(publications.map(pub => pub.year))]
      .sort((a, b) => Number(b) - Number(a));

    const groupedPublications = publications => publications.reduce((map, pub) => {
      if (!map[pub.year]) map[pub.year] = [];
      map[pub.year].push(pub);
      return map;
    }, {});

    const publicationHtml = pub => {
      const doi = pub.doiText
        ? `<span class="doi">DOI:${pub.doiUrl ? `<a href="${pub.doiUrl}" target="_blank" rel="noopener noreferrer">${pub.doiText}</a>` : pub.doiText}.</span>`
        : "";
      return `
        <li>
          <span class="authors">${pub.authorsHtml}</span>
          <span class="title-inline">${pub.title}</span>.
          <span class="publication-info">${pub.venueHtml}</span>
          <span class="year">(${pub.year}).</span>
          ${doi}
        </li>`;
    };

    const setupInteraction = () => {
      const navLinks = document.querySelectorAll('a[href^="#"]');
      const topNavLinks = document.querySelectorAll('nav.primary a[href^="#"]');
      const sideNavLinks = document.querySelectorAll('.side-nav a[href^="#"]');
      const sections = document.querySelectorAll('main section[id]');
      const panels = document.querySelectorAll('section.panel');
      const toTop = document.getElementById('toTopBtn');
      const progress = document.getElementById('scrollProgress');
      const toast = document.getElementById('toast');

      const setActive = () => {
        let current = '';
        sections.forEach(section => {
          const rect = section.getBoundingClientRect();
          if (rect.top <= 140 && rect.bottom >= 140) current = '#' + section.id;
        });
        [...topNavLinks, ...sideNavLinks].forEach(link => {
          if (link.getAttribute('href') === current) link.setAttribute('aria-current', 'page');
          else link.removeAttribute('aria-current');
        });
      };

      const updateProgress = () => {
        const doc = document.documentElement;
        const max = doc.scrollHeight - doc.clientHeight;
        const ratio = max > 0 ? window.scrollY / max : 0;
        progress.style.transform = `scaleX(${Math.min(Math.max(ratio, 0), 1)})`;
      };

      const toggleTop = () => {
        if (window.scrollY > 520) toTop.classList.add('show');
        else toTop.classList.remove('show');
      };

      navLinks.forEach(link => {
        link.addEventListener('click', e => {
          const id = link.getAttribute('href');
          if (!id || id === '#') return;
          const target = document.querySelector(id);
          if (!target) return;
          e.preventDefault();
          const y = target.getBoundingClientRect().top + window.pageYOffset - 96;
          window.scrollTo({ top: y, behavior: 'smooth' });
          history.pushState(null, '', id);
        });
      });

      toTop.addEventListener('click', e => {
        e.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      const revealObserver = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            revealObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.12 });
      panels.forEach(panel => revealObserver.observe(panel));

      document.querySelectorAll('.copy-email').forEach(button => {
        button.addEventListener('click', async () => {
          const text = button.getAttribute('data-copy') || SITE_DATA.profile.emails[0];
          try {
            await navigator.clipboard.writeText(text);
            toast.textContent = '邮箱已复制：' + text;
          } catch (error) {
            toast.textContent = '邮箱：' + text;
          }
          toast.classList.add('show');
          window.clearTimeout(window.__emailToastTimer);
          window.__emailToastTimer = window.setTimeout(() => toast.classList.remove('show'), 1800);
        });
      });

      const updateAll = () => { setActive(); toggleTop(); updateProgress(); };
      updateAll();
      document.addEventListener('scroll', updateAll, { passive: true });
      window.addEventListener('resize', updateAll);

      if (location.hash) {
        const target = document.querySelector(location.hash);
        if (target) {
          setTimeout(() => {
            const y = target.getBoundingClientRect().top + window.pageYOffset - 96;
            window.scrollTo({ top: y, behavior: 'smooth' });
          }, 60);
        }
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      renderHero();
      renderNavigation();
      renderMain();
      setupInteraction();
